<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact | Marvin Portfolio</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
<div class="container">

<header>
    <div class="header-top">
        <div>
            <h1>Contact</h1>
            <p>Reach out for collaboration</p>
        </div>

        <nav>
            <a href="index.html"><i class="fas fa-home"></i> Home</a>
            <a href="about.html"><i class="fas fa-user"></i> About</a>
            <a href="gallery.html"><i class="fas fa-image"></i> Gallery</a>
            <a href="data.html"><i class="fas fa-chart-bar"></i> Data</a>
            <a href="contact.html"><i class="fas fa-envelope"></i> Contact</a>
        </nav>
    </div>
</header>

<main>

<section>
    <h2><i class="fas fa-paper-plane"></i> Send a Message</h2>

    <form>

        <label for="name">Full Name:</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Email Address:</label>
        <input type="email" id="email" name="email" required>

        <label for="phone">Phone Number:</label>
        <input type="tel" id="phone" name="phone" required>

        <label for="message">Message:</label>
        <textarea id="message" name="message" rows="5" required></textarea>

        <input type="submit" value="Send Message">

    </form>
</section>

</main>

<footer>
    <p>&copy; 2026 Theketheke | Contact Page</p>
</footer>

</div>
</body>
</html>
